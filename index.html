<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bracket Validator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 50px; 
            text-align: center; 
            background-color: #f4f6f9; 
        }
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 30px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { 
            color: #333; 
            margin-bottom: 20px; 
        }
        
        /* The customizable text input area */
        .editor-box {
            width: 90%;
            min-height: 40px;
            margin: 0 auto 15px auto;
            padding: 12px;
            font-size: 22px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border: 2px solid #ccc;
            border-radius: 6px;
            text-align: left;
            outline: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #fff;
            transition: border-color 0.2s;
        }
        .editor-box:focus { 
            border-color: #007bff; 
        }
        
        /* Placeholder for empty input area */
        .editor-box:empty:before {
            content: attr(data-placeholder);
            color: #aaa;
            font-weight: normal;
            font-size: 16px;
            font-family: Arial, sans-serif;
        }

        /* Color schemes for bracket syntax highlighting */
        .paren { color: #e06c75; }        /* Light Pink/Red for () */
        .bracket { color: #98c379; }      /* Green for [] */
        .brace { color: #61afef; }        /* Blue for {} */
        .invalid-char { 
            color: #abb2bf; 
            font-weight: normal; 
        } 

        /* Validation UI Results */
        #result { 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 24px; 
            letter-spacing: 1px; 
        }
        .valid { color: #28a745; }
        .invalid { color: #dc3545; }
        .empty { color: #6c757d; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Live Bracket Validator</h2>
    
    <div id="bracketInput" class="editor-box" contenteditable="true" data-placeholder="Type brackets here... e.g. {([])}"></div>
    
    <div id="result" class="empty">Waiting for input...</div>
</div>

<script>
    const inputEl = document.getElementById('bracketInput');
    const resultDiv = document.getElementById('result');

    // 1. Core Logic (Your C++ logic ported cleanly to JS)
    function checkBrackets(text) {
        let length = text.length;
        if (length === 0) return "EMPTY";
        if (length % 2 !== 0) return "INVALID";

        let parenthesesConst = 0; 
        let bracketConst = 0;
        let braceConst = 0;
        let priorityAscendingOrder = "";

        for (let i = 0; i < length; i++) {
            let ltr = text[i];
            let isOpening = false;
            
            if (ltr === '(') {
                parenthesesConst += 1;
                isOpening = true;
                priorityAscendingOrder += "1";
            }
            else if (ltr === ')') {
                parenthesesConst -= 1;
            }
            else if (ltr === '[') {
                isOpening = true;
                bracketConst += 1;
                priorityAscendingOrder += "2";
            }
            else if (ltr === ']') {
                bracketConst -= 1;
            }
            else if (ltr === '{') {
                isOpening = true;
                braceConst += 1;
                priorityAscendingOrder += "3";
            }
            else if (ltr === '}') {
                braceConst -= 1;
            } else {
                return "INVALID"; 
            }

            if (parenthesesConst < 0 || bracketConst < 0 || braceConst < 0) {
                return "INVALID"; 
            }

            if (!isOpening) {
                if (priorityAscendingOrder.length === 0) {
                    return "INVALID";
                }

                let currentSpin = "0";
                let highestPriority = priorityAscendingOrder.slice(-1);
                
                if (ltr === ')') { currentSpin = "1"; }
                else if (ltr === ']') { currentSpin = "2"; }
                else if (ltr === '}') { currentSpin = "3"; }

                if (currentSpin !== highestPriority) {
                    return "INVALID";
                }
                else {
                    priorityAscendingOrder = priorityAscendingOrder.slice(0, -1);
                }
            }
        }

        return (parenthesesConst === 0 && bracketConst === 0 && braceConst === 0) ? "VALID" : "INVALID";
    }

    // Helper to calculate total character offset of the cursor
    function getCaretCharacterOffset(element) {
        let caretOffset = 0;
        const doc = element.ownerDocument || element.document;
        const win = doc.defaultView || doc.parentWindow;
        const sel = win.getSelection();
        if (sel.rangeCount > 0) {
            const range = sel.getRangeAt(0);
            const preCaretRange = range.cloneRange();
            preCaretRange.selectNodeContents(element);
            preCaretRange.setEnd(range.endContainer, range.endOffset);
            caretOffset = preCaretRange.toString().length;
        }
        return caretOffset;
    }

    // Helper to restore cursor position based on character count
    function setCaretPosition(element, offset) {
        let charCount = 0;
        let type = document.createRange();
        type.setStart(element, 0);
        type.collapse(true);
        
        let nodeStack = [element], node, found = false;
        
        while (!found && (node = nodeStack.pop())) {
            if (node.nodeType === 3) { // Text node
                let nextCharCount = charCount + node.length;
                if (offset >= charCount && offset <= nextCharCount) {
                    type.setStart(node, offset - charCount);
                    type.collapse(true);
                    found = true;
                }
                charCount = nextCharCount;
            } else {
                let i = node.childNodes.length;
                while (i--) {
                    nodeStack.push(node.childNodes[i]);
                }
            }
        }
        
        let sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(type);
    }

    // 2. Live-checking and colorizer runtime engine
    inputEl.addEventListener('input', () => {
        let rawText = inputEl.innerText;
        
        // Save absolute cursor position character index
        let savedOffset = getCaretCharacterOffset(inputEl);
        
        let coloredHTML = "";
        for (let char of rawText) {
            if (char === '(' || char === ')') {
                coloredHTML += `<span class="paren">${char}</span>`;
            } else if (char === '[' || char === ']') {
                coloredHTML += `<span class="bracket">${char}</span>`;
            } else if (char === '{' || char === '}') {
                coloredHTML += `<span class="brace">${char}</span>`;
            } else {
                coloredHTML += `<span class="invalid-char">${char}</span>`;
            }
        }

        inputEl.innerHTML = coloredHTML;

        // Restore cursor based on absolute index count
        if (rawText.length > 0) {
            setCaretPosition(inputEl, savedOffset);
        }

        // Output validation logic execution
        const status = checkBrackets(rawText);
        if (status === "VALID") {
            resultDiv.innerText = "VALID";
            resultDiv.className = "valid";
        } else if (status === "INVALID") {
            resultDiv.innerText = "INVALID";
            resultDiv.className = "invalid";
        } else {
            resultDiv.innerText = "Waiting for input...";
            resultDiv.className = "empty";
        }
    });
</script>

</body>
</html>
